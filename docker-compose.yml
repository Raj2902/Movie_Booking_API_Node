version: "3.8"

services:
  app:
    build: .
    container_name: movie-booking-backend-container1
    env_file:
      - .env
    depends_on:
      - mongo
    restart: always
    ports:
      - "3000:3000"

  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
